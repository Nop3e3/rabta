<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />

    <!-- Favicon -->
    <link rel="icon" href="%PUBLIC_URL%/rabtafavicon.svg" />

    <!-- Viewport -->
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- Theme Color -->
    <meta name="theme-color" content="#0A0A0A" />

    <!-- Primary SEO Description -->
    <meta
      name="description"
      content="Rabta is a B2B fashion platform connecting brands with trusted suppliers, manufacturers, and materials. Streamline sourcing, production, and collaboration in one place."
    />

    <!-- Keywords (optional but still useful) -->
    <meta
      name="keywords"
      content="fashion B2B, clothing manufacturers, textile suppliers, fashion sourcing, Rabta, garment production, fashion platform"
    />

    <!-- Author -->
    <meta name="author" content="Rabta" />

    <!-- Open Graph (for social sharing) -->
    <meta property="og:title" content="Rabta | Fashion B2B Platform" />
    <meta
      property="og:description"
      content="Connect with verified fashion suppliers and manufacturers. Rabta simplifies sourcing and production for modern fashion brands."
    />
    <meta property="og:image" content="%PUBLIC_URL%/rabta-preview.png" />
    <meta property="og:type" content="website" />

    <!-- Twitter Preview -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Rabta | Fashion B2B Platform" />
    <meta
      name="twitter:description"
      content="Your gateway to reliable fashion suppliers and manufacturers."
    />
    <meta name="twitter:image" content="%PUBLIC_URL%/rabta-preview.png" />

    <!-- Apple Touch Icon -->
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />

    <!-- Manifest -->
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

    <!-- Title (VERY IMPORTANT) -->
    <title>Rabta | Fashion B2B Sourcing Platform</title>
  </head>

  <body>
    <noscript>You need to enable JavaScript to run Rabta.</noscript>
    <div id="root"></div>
  </body>
</html>
